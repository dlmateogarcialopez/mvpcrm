# ============================================
# Máquina de Ventas — Docker Compose (Simplificado)
# 2 Servicios: Aplicación Unificada (API + Front) + Base de Datos (MySQL)
# ============================================

services:
  # --- DATABASE ---
  db:
    image: mysql:8.0
    container_name: mv-database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-maquina_ventas}
      MYSQL_USER: ${DB_USER:-mv_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mv_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mv-network

  # --- UNIFIED APP (Backend + Frontend) ---
  app:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        VITE_APP_ID: ${VITE_APP_ID:-}
        VITE_OAUTH_PORTAL_URL: ${OAUTH_SERVER_URL:-}
        VITE_FRONTEND_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
        VITE_FRONTEND_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
    container_name: mv-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${DB_USER:-mv_user}:${DB_PASSWORD:-mv_password}@db:3306/${DB_NAME:-maquina_ventas}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mv-network

volumes:
  mysql_data:
    driver: local

networks:
  mv-network:
    driver: bridge
